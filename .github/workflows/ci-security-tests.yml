name: Guardrails CI Security Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    # Step 2: Set up Python environment
    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic pytest pytest-asyncio httpx jinja2 python-multipart ollama

    # Step 4: INSTALL OLLAMA BINARY (Fast script, always runs)
    - name: Install Ollama Binary
      run: |
        curl -fsSL https://ollama.com/install.sh | sh

    # NEW STEP 5: CACHE LLAMA MODEL WEIGHTS
    # This step tells GitHub to look for the hidden model folder inside the runner's home directory.
    - name: Cache Ollama Models
      id: cache-ollama
      uses: actions/cache@v4
      with:
        path: ~/.ollama/models
        # The key uses a unique hash identifier. If you ever want to switch models (e.g., to llama3.2),
        # changing the text string in the key below forces GitHub to reset the cache automatically.
        key: ${{ runner.os }}-ollama-llama3-v1
        restore-keys: |
          ${{ runner.os }}-ollama-llama3-

    # Step 6: PULL WEIGHTS ONLY IF CACHE WAS MISSING
    # The 'if' condition checks if the previous cache step successfully found the data.
    - name: Pull Llama3 Model Weights (Cache Miss Only)
      if: steps.cache-ollama.outputs.cache-hit != 'true'
      run: |
        ollama pull llama3

    # Step 7: SPIN UP ENGINE BACKGROUND PROCESS
    - name: Start Ollama Engine
      run: |
        ollama serve > ollama.log 2>&1 &
        sleep 10

    # Step 8: Execute the Pytest suite
    - name: Run Test Suite Matrix
      run: |
        python -m pytest -v
